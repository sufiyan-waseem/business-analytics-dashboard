<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .header h1 {
        color: #333;
        font-size: 28px;
      }

      .header p {
        color: #666;
        margin-top: 5px;
        font-size: 14px;
      }

      #loading {
        background: white;
        padding: 40px;
        border-radius: 8px;
        text-align: center;
        font-size: 18px;
        color: #667eea;
      }

      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card h3 {
        color: #333;
        margin-bottom: 15px;
        font-size: 18px;
        border-bottom: 2px solid #667eea;
        padding-bottom: 10px;
      }

      .chart-container {
        position: relative;
        min-height: 300px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      th {
        background: #f8f9fa;
        color: #333;
        padding: 12px;
        text-align: left;
        font-weight: 600;
        border-bottom: 2px solid #667eea;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #e9ecef;
      }

      tr:hover {
        background: #f8f9fa;
      }

      .status-active {
        background: #d4edda;
        color: #155724;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-churned {
        background: #f8d7da;
        color: #721c24;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
      }

      .number {
        text-align: right;
        font-family: "Courier New", monospace;
      }

      /* Mobile Responsive */
      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }

        .chart-container {
          min-height: 200px;
        }

        .card {
          padding: 15px;
        }

        .card h3 {
          font-size: 16px;
        }

        th,
        td {
          padding: 8px;
          font-size: 14px;
        }

        .header h1 {
          font-size: 22px;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        .card {
          padding: 12px;
        }

        table {
          font-size: 12px;
        }

        th,
        td {
          padding: 6px;
        }

        .header {
          padding: 15px;
        }

        .chart-container {
          min-height: 150px;
        }
      }

      .error-state {
        background: #f8d7da;
        color: #721c24;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
        border: 1px solid #f5c6cb;
      }

      .success-state {
        background: #d4edda;
        color: #155724;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
        border: 1px solid #c3e6cb;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>📊 Business Analytics Dashboard</h1>
      <p>Real-time insights into your business performance</p>
    </div>

    <div id="loading">
      <p>⏳ Loading data...</p>
    </div>

    <div class="container" id="dashboard" style="display: none">
      <div class="card">
        <h3>📈 Monthly Revenue</h3>
        <div class="chart-container">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h3>🏆 Category Performance</h3>
        <div class="chart-container">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h3>⭐ Top Customers (Last 90 Days)</h3>
        <table id="customersTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Region</th>
              <th style="text-align: right">Total Spend</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card">
        <h3>🌍 Regional Analysis</h3>
        <table id="regionTable">
          <thead>
            <tr>
              <th>Region</th>
              <th class="number">Customers</th>
              <th class="number">Orders</th>
              <th class="number">Revenue</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div id="error" class="error-state" style="display: none">
      <p>
        <strong>⚠️ Error Loading Dashboard:</strong>
        <span id="errorMessage"></span>
      </p>
    </div>

    <script>
      // Formatting helpers
      function formatCurrency(value) {
        if (!value || isNaN(value)) return "$0.00";
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        }).format(value);
      }

      function formatNumber(value) {
        if (!value || isNaN(value)) return "0";
        return new Intl.NumberFormat("en-US").format(Math.round(value));
      }

      function formatChurnStatus(churned) {
        if (churned === true || churned === "True" || churned === 1) {
          return "🚨 Churned";
        } else if (churned === false || churned === "False" || churned === 0) {
          return "✓ Active";
        }
        return "Unknown";
      }

      function getChurnStatusClass(churned) {
        if (churned === true || churned === "True" || churned === 1) {
          return "status-churned";
        }
        return "status-active";
      }

      const API = "http://127.0.0.1:8000/api";

      async function loadDashboard() {
        try {
          console.log("Loading dashboard data from API...");

          const revenue = await fetch(API + "/revenue").then((r) => {
            if (!r.ok) throw new Error(`Failed to fetch revenue: ${r.status}`);
            return r.json();
          });

          const categories = await fetch(API + "/categories").then((r) => {
            if (!r.ok)
              throw new Error(`Failed to fetch categories: ${r.status}`);
            return r.json();
          });

          const customers = await fetch(API + "/top-customers").then((r) => {
            if (!r.ok)
              throw new Error(`Failed to fetch customers: ${r.status}`);
            return r.json();
          });

          const regions = await fetch(API + "/regions").then((r) => {
            if (!r.ok) throw new Error(`Failed to fetch regions: ${r.status}`);
            return r.json();
          });

          document.getElementById("loading").style.display = "none";
          document.getElementById("dashboard").style.display = "grid";

          /* Revenue Chart */
          if (revenue.length > 0) {
            new Chart(document.getElementById("revenueChart"), {
              type: "line",
              data: {
                labels: revenue.map((r) => r.order_year_month),
                datasets: [
                  {
                    label: "Revenue ($)",
                    data: revenue.map((r) => r.amount),
                    borderColor: "#667eea",
                    backgroundColor: "rgba(102, 126, 234, 0.1)",
                    tension: 0.4,
                    fill: true,
                    pointRadius: 5,
                    pointBackgroundColor: "#667eea",
                    pointBorderColor: "#fff",
                    pointBorderWidth: 2,
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    display: true,
                    position: "top",
                  },
                },
                scales: {
                  y: {
                    ticks: {
                      callback: function (value) {
                        return "$" + value.toLocaleString();
                      },
                    },
                  },
                },
              },
            });
          }

          /* Category Chart */
          if (categories.length > 0) {
            new Chart(document.getElementById("categoryChart"), {
              type: "bar",
              data: {
                labels: categories.map((c) => c.category),
                datasets: [
                  {
                    label: "Revenue ($)",
                    data: categories.map((c) => c.total_revenue),
                    backgroundColor: [
                      "#667eea",
                      "#764ba2",
                      "#f093fb",
                      "#4facfe",
                      "#00f2fe",
                      "#43e97b",
                    ],
                  },
                ],
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    display: false,
                  },
                },
              },
            });
          }

          /* Customers Table */
          const custTable = document.querySelector("#customersTable tbody");
          custTable.innerHTML = ""; // Clear existing rows
          customers.forEach((c) => {
            const row = document.createElement("tr");
            const churnClass = getChurnStatusClass(c.churned);
            const churnText = formatChurnStatus(c.churned);

            row.innerHTML = `
                <td><strong>${c.name || "N/A"}</strong></td>
                <td>${c.region || "Unknown"}</td>
                <td style="text-align: right;">${formatCurrency(c.total_spend)}</td>
                <td><span class="${churnClass}">${churnText}</span></td>
            `;
            custTable.appendChild(row);
          });

          /* Regions Table */
          const regTable = document.querySelector("#regionTable tbody");
          regTable.innerHTML = ""; // Clear existing rows
          regions.forEach((r) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><strong>${r.region || "Unknown"}</strong></td>
                <td class="number">${formatNumber(r.customers)}</td>
                <td class="number">${formatNumber(r.orders)}</td>
                <td class="number">${formatCurrency(r.revenue)}</td>
            `;
            regTable.appendChild(row);
          });

          console.log("Dashboard loaded successfully!");
        } catch (error) {
          console.error("Dashboard error:", error);
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          document.getElementById("errorMessage").textContent =
            error.message ||
            "Failed to load dashboard data. Check console for details.";
        }
      }

      // Load dashboard when page loads
      document.addEventListener("DOMContentLoaded", loadDashboard);
    </script>
  </body>
</html>
